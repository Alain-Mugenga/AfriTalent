<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AfriTalent</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="nav-logo"><span class="logo-icon">🌍</span><span>AfriTalent</span></a>
    <div class="hamburger"><span></span><span></span><span></span></div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/pages/athletes.html">Athletes</a></li>
      <li><a href="/pages/stories.html">Success Stories</a></li>
      <li><a href="/pages/register.html">Register as Athlete</a></li>
      <ul id="nav-auth" style="display:contents;list-style:none"></ul>
    </ul>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <h2>Welcome Back 👋</h2>
    <p class="form-subtitle">Login to your AfriTalent account</p>
    <div class="alert alert-error" id="login-error"></div>
    <div class="alert alert-success" id="login-success"></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="login-email" placeholder="your@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="Your password"></div>
    <button class="form-btn" id="login-btn">Login →</button>
    <div class="form-switch">Don't have an account? <a href="/pages/register.html">Register here</a></div>
    <div class="form-switch" style="margin-top:0.5rem"><small style="color:var(--text-muted)">Admin: admin@afritalent.com / admin123</small></div>
  </div>
</div>

<footer>
  <div class="footer-inner"><div class="footer-bottom"><p>&copy; 2026 African Athlete Talent Platform.</p></div></div>
</footer>

<script type="module">
import { API, showToast } from '/js/main.js';

const btn = document.getElementById('login-btn');
document.getElementById('login-password').addEventListener('keypress', e => { if(e.key==='Enter') btn.click(); });

btn.addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const succEl = document.getElementById('login-success');
  errEl.style.display = 'none'; succEl.style.display = 'none';

  if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display='block'; return; }

  btn.textContent = 'Logging in...'; btn.disabled = true;
  try {
    const res = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Login failed.'; errEl.style.display='block'; btn.textContent='Login →'; btn.disabled=false; return; }
    succEl.textContent = `Welcome back, ${data.user.name}! Redirecting...`; succEl.style.display='block';
    showToast(`Welcome back, ${data.user.name}!`);
    setTimeout(() => window.location.href = data.user.role === 'admin' ? '/pages/admin.html' : '/', 1000);
  } catch { errEl.textContent='Login failed. Please try again.'; errEl.style.display='block'; btn.textContent='Login →'; btn.disabled=false; }
});
</script>
</body>
</html>
